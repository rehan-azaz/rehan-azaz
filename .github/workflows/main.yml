name: Generate Commits

on:
  schedule: # Automatically trigger every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch: # Optional manual trigger

jobs:
  build:
    name: Generate Snake Animation
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Generate Snake Animation
      - name: Generate Snake Game from GitHub Contribution Grid
        uses: Platane/snk@v3.2.0
        id: snake-gif
        with:
          github_user_name: rehan-azaz # Replace with your GitHub username
          svg_out_path: dist/github-contribution-grid-snake.svg

      # Step 3: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@latest
        with:
          target_branch: main
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
